spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/peakmate
    username: ${DB_USERNAME:peakmate}
    password: ${DB_PASSWORD:peakmate}

security:
  cookie:
    secure: false
  encryption:
    # [로컬 개발용] 암호화 테스트 키 (운영 환경용 키와 무관함)
    # 보안을 위해 운영/개발 서버에서는 반드시 환경변수(ENCRYPTION_KEY)를 통해 실제 키를 주입해야 합니다.
    # 로컬 환경의 실행 편의를 위해, 환경변수가 설정되지 않은 경우에만 이 더미 키를 기본값으로 사용합니다.
    key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

logging:
  level:
    com.peakmate: DEBUG
    org.hibernate.SQL: DEBUG
