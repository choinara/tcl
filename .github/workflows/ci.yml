name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'peakmate-core/**'
      - 'peakmate-core-be/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  pull-requests: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # 변경 감지
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'peakmate-core/**'
            backend:
              - 'backend/**'
              - 'peakmate-core-be/**'

  # Frontend 빌드
  frontend-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install peakmate-core dependencies
        working-directory: peakmate-core
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run type check
        working-directory: frontend
        run: npm run type-check
        continue-on-error: true

      - name: Run tests
        working-directory: frontend
        run: npm run test:run
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build-prod
        env:
          VITE_API_BASE_URL: /api

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # Backend 빌드
  backend-build:
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build]
    if: always() && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true') && needs.frontend-build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create static directory
        run: mkdir -p backend/src/main/resources/static

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/src/main/resources/static

      - name: Grant execute permission
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew clean build -x test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Run tests
        working-directory: backend
        run: ./gradlew test
        continue-on-error: true
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 5
